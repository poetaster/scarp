name: build firmware

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kit:
          - { name: trippy,    flag: "" }
          - { name: 80s,       flag: "-DKIT_80S" }
          - { name: angularj,  flag: "-DKIT_ANGULARJ" }
          - { name: mixp,       flag: "-DKIT_MIXP" }
          - { name: tekke,     flag: "-DKIT_TEKKE" }
        enc:
          - { dir: "1",  suffix: "" }                    # normal encoder
          - { dir: "-1", suffix: ".encoder_reversed" }   # reversed encoder

    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install RP2350 core and libraries
        run: |
          arduino-cli config init --additional-urls https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json
          arduino-cli core update-index
          arduino-cli core install rp2040:rp2040@5.6.1
          arduino-cli lib install \
            Adafruit\ SH110X \
            Adafruit\ GFX\ Library \
            RotaryEncoder@1.5.3 \
            Bounce2@2.71.0 \
            RPi_Pico_TimerInterrupt@1.3.1

      - name: Build ${{ matrix.kit.name }}${{ matrix.enc.suffix }}
        run: |
          arduino-cli compile \
            -b rp2040:rp2040:rpipico:freq=276,opt=Optimize2 \
            --build-property "compiler.cpp.extra_flags=-DENC_DIR=${{ matrix.enc.dir }} ${{ matrix.kit.flag }}" \
            --output-dir out \
            firmware/Pikobeats
          mv out/Pikobeats.ino.uf2 "Pikobeats.${{ matrix.kit.name }}${{ matrix.enc.suffix }}.rp2040.uf2"

      # Downloadable from the Actions run for every commit
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pikobeats.${{ matrix.kit.name }}${{ matrix.enc.suffix }}.rp2040
          path: Pikobeats.${{ matrix.kit.name }}${{ matrix.enc.suffix }}.rp2040.uf2

      - name: Extract Version Name
        id: extract_name
        uses: actions/github-script@v4
        with:
          result-encoding: string
          script: |
            return context.payload.ref.replace(/refs\/tags\//, '');

      - name: Create a Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ steps.extract_name.outputs.result }}
          draft: false
          prerelease: false
          body: This release was autogenerated.
          files: '*.uf2'

            #    - name: Upload to release
            #env:
            #GH_TOKEN: ${{ github.token }}
            #run: |
            #gh release upload "${{ inputs.release_tag }}" \
            #"Pikobeats.${{ matrix.kit.name }}${{ matrix.enc.suffix }}.rp2040.uf2" --clobber
